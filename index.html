<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Persetujuan Izin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="LOGO-MAHAD-ALY.png" type="image/x-icon" />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f3f4f6;
      }

      .loader {
        border-top-color: #2563eb;
        animation: spinner 1s linear infinite;
      }

      @keyframes spinner {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 768px) {
        table thead {
          display: none;
        }

        table,
        table tbody,
        table tr,
        table td {
          display: block;
          width: 100%;
        }

        table tr {
          margin-bottom: 16px;
          border: 1px solid #e5e7eb;
          border-radius: 12px;
          padding: 12px;
          background: white;
        }

        table td {
          border: none;
          padding: 6px 0;
          white-space: normal;
        }

        table td::before {
          content: attr(data-label);
          font-weight: 600;
          display: block;
          color: #64748b;
          margin-bottom: 4px;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-100 p-4 md:p-8">
    <div class="w-full max-w-7xl mx-auto">
      <div
        class="bg-slate-800 rounded-t-2xl px-6 py-5 flex justify-between items-center text-white shadow-lg"
      >
        <div>
          <h1 class="text-xl font-bold tracking-wide">
            Dashboard Persetujuan Izin
          </h1>
          <p class="text-slate-300 text-sm mt-1">Sistem Informasi Akademik</p>
        </div>
        <div class="flex flex-wrap gap-2 justify-end">
          <button
            type="button"
            onclick="downloadExcel()"
            class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-2"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 4v10m0 0l-4-4m4 4l4-4M4 20h16"
              ></path>
            </svg>
            Download Excel
          </button>
          <button
            type="button"
            onclick="loadData()"
            class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-2"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
              ></path>
            </svg>
            Refresh Data
          </button>
        </div>
      </div>

      <div class="p-4 border-b bg-slate-50">
        <select id="filterStatus" class="border rounded-lg px-3 py-2">
          <option value="all">Semua Status</option>
          <option value="Menunggu">Menunggu</option>
          <option value="Disetujui">Disetujui</option>
          <option value="Ditolak">Ditolak</option>
        </select>
      </div>

      <div
        class="bg-white rounded-b-2xl shadow-xl overflow-hidden border border-slate-200"
      >
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 p-6">
          <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4">
            <p class="text-sm text-yellow-700">Menunggu</p>
            <h2 id="countPending" class="text-2xl font-bold">0</h2>
          </div>

          <div class="bg-green-50 border border-green-200 rounded-xl p-4">
            <p class="text-sm text-green-700">Disetujui</p>
            <h2 id="countApproved" class="text-2xl font-bold">0</h2>
          </div>

          <div class="bg-red-50 border border-red-200 rounded-xl p-4">
            <p class="text-sm text-red-700">Ditolak</p>
            <h2 id="countRejected" class="text-2xl font-bold">0</h2>
          </div>

          <div class="bg-blue-50 border border-blue-200 rounded-xl p-4">
            <p class="text-sm text-blue-700">Total</p>
            <h2 id="countTotal" class="text-2xl font-bold">0</h2>
          </div>
        </div>

        <div
          id="loadingState"
          class="flex flex-col items-center justify-center py-20"
        >
          <div
            class="loader border-4 border-slate-200 rounded-full w-10 h-10 mb-4"
          ></div>
          <p class="text-slate-500 font-medium text-sm">
            Memuat data dari server...
          </p>
        </div>

        <div id="tableContainer" class="hidden overflow-x-auto">
          <table class="w-full whitespace-nowrap">
            <thead
              class="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs font-semibold uppercase tracking-wider text-left"
            >
              <tr>
                <th class="px-6 py-4">Waktu</th>
                <th class="px-6 py-4">Mahasiswa</th>
                <th class="px-6 py-4">Detail Izin</th>
                <th class="px-6 py-4">Alasan</th>
                <th class="px-6 py-4 text-center">Bukti</th>
                <th class="px-6 py-4 text-center">Status</th>
                <th class="px-6 py-4 text-center">Aksi</th>
              </tr>
            </thead>
            <tbody
              id="tableBody"
              class="divide-y divide-slate-100 text-sm text-slate-700"
            ></tbody>
          </table>
        </div>

        <div id="emptyState" class="hidden py-16 text-center text-slate-400">
          <p>Belum ada data pengajuan izin.</p>
        </div>
      </div>
    </div>

    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbzp5d3JxPVg0jq1UN6Y-Pc15kBte5_bUIL5oHpkevOLLTJAtWpDKGi0qQe1WKMuQnMV/exec";
      const API_KEY = "AMTSILATI_2026_METAHATI";
      const AUTO_REFRESH_INTERVAL = 30 * 1000;
      const filterStatus = document.getElementById("filterStatus");
      const tableBody = document.getElementById("tableBody");

      function getConnectionErrorMessage() {
        if (window.location.protocol === "file:") {
          return "Halaman admin dibuka dari file lokal. Jalankan lewat server lokal agar browser mengizinkan koneksi ke server.";
        }

        return "Tidak dapat terhubung ke server izin. Cek koneksi internet atau deployment Google Apps Script.";
      }

      async function parseJsonResponse(response) {
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const responseText = await response.text();

        try {
          return JSON.parse(responseText);
        } catch {
          throw new Error("Respons server tidak valid.");
        }
      }

      async function postToScript(payload) {
        let response;

        try {
          response = await fetch(SCRIPT_URL, {
            method: "POST",
            headers: {
              "Content-Type": "text/plain;charset=utf-8",
            },
            body: JSON.stringify(payload),
          });
        } catch (error) {
          throw new Error(getConnectionErrorMessage());
        }

        return parseJsonResponse(response);
      }

      function normalizeWhatsAppNumber(nohp) {
        const digitsOnly = String(nohp || "").replace(/\D/g, "");

        if (!digitsOnly) return "";
        if (digitsOnly.startsWith("628")) return digitsOnly;
        if (digitsOnly.startsWith("08")) return digitsOnly;
        if (digitsOnly.startsWith("8")) return `0${digitsOnly}`;
        if (digitsOnly.startsWith("62")) return digitsOnly;

        return digitsOnly;
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => {
          const entities = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          };

          return entities[char];
        });
      }

      function normalizeStatus(status) {
        return status === "Menunggu Persetujuan" ? "Menunggu" : status;
      }

      function formatTimestamp(timestamp) {
        const dateObj = new Date(timestamp);

        if (Number.isNaN(dateObj.getTime())) {
          return "-";
        }

        return (
          dateObj.toLocaleDateString("id-ID", {
            day: "2-digit",
            month: "short",
          }) +
          " " +
          dateObj.toLocaleTimeString("id-ID", {
            hour: "2-digit",
            minute: "2-digit",
          })
        );
      }

      function isYesterday(timestamp) {
        const itemDate = new Date(timestamp);

        if (Number.isNaN(itemDate.getTime())) {
          return false;
        }

        const now = new Date();
        const yesterday = new Date(
          now.getFullYear(),
          now.getMonth(),
          now.getDate() - 1,
        );
        const itemDay = new Date(
          itemDate.getFullYear(),
          itemDate.getMonth(),
          itemDate.getDate(),
        );

        return itemDay.getTime() === yesterday.getTime();
      }

      function getStatusBadge(status) {
        if (status === "Disetujui") {
          return '<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-semibold">Disetujui</span>';
        }

        if (status === "Ditolak") {
          return '<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-semibold">Ditolak</span>';
        }

        return '<span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-semibold">Menunggu</span>';
      }

      function applyFilter() {
        const selected = filterStatus.value;

        document.querySelectorAll("#tableBody tr").forEach((row) => {
          const status = row.dataset.status;
          row.style.display =
            selected === "all" || status === selected ? "" : "none";
        });
      }

      document.addEventListener("DOMContentLoaded", loadData);

      async function loadData() {
        let pending = 0;
        let approved = 0;
        let rejected = 0;

        const loading = document.getElementById("loadingState");
        const tableDiv = document.getElementById("tableContainer");
        const emptyDiv = document.getElementById("emptyState");

        loading.classList.remove("hidden");
        tableDiv.classList.add("hidden");
        emptyDiv.classList.add("hidden");
        tableBody.innerHTML = "";

        try {
          let response;

          try {
            response = await fetch(SCRIPT_URL);
          } catch (error) {
            throw new Error(getConnectionErrorMessage());
          }

          const data = await parseJsonResponse(response);

          if (!Array.isArray(data) || data.length === 0) {
            emptyDiv.classList.remove("hidden");
            document.getElementById("countPending").textContent = "0";
            document.getElementById("countApproved").textContent = "0";
            document.getElementById("countRejected").textContent = "0";
            document.getElementById("countTotal").textContent = "0";
            return;
          }

          data
            .filter((item) => item && (item.nama || item.kelas || item.status))
            .reverse()
            .forEach((item) => {
            const normalizedStatus = normalizeStatus(item.status);

            if (normalizedStatus === "Disetujui") {
              approved++;
            } else if (normalizedStatus === "Ditolak") {
              rejected++;
            } else {
              pending++;
            }

            const row = document.createElement("tr");
            row.dataset.status = normalizedStatus;

            if (normalizedStatus === "Disetujui") {
              row.className = "bg-green-50 hover:bg-green-100 transition";
            } else if (normalizedStatus === "Ditolak") {
              row.className = "bg-red-50 hover:bg-red-100 transition";
            } else {
              row.className = "bg-yellow-50 hover:bg-yellow-100 transition";
            }

            const rowId = Number(item.row);
            const canDelete = isYesterday(item.timestamp);
            const buktiLink = item.bukti
              ? `<a href="${escapeHtml(item.bukti)}" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:text-blue-800 hover:underline font-medium text-xs">Lihat File</a>`
              : '<span class="text-xs text-slate-400">Tidak ada file</span>';

            const statusActions =
              normalizedStatus === "Menunggu"
                ? `
                  <div class="flex gap-2 justify-center" id="action-${rowId}">
                    <button
                      type="button"
                      data-action="status"
                      data-row="${rowId}"
                      data-status="Disetujui"
                      data-nohp="${escapeHtml(item.nohp)}"
                      data-nama="${escapeHtml(item.nama)}"
                      class="admin-action bg-green-500 hover:bg-green-600 text-white p-1.5 rounded shadow"
                      title="Setujui"
                    >
                      <svg class="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </button>
                    <button
                      type="button"
                      data-action="status"
                      data-row="${rowId}"
                      data-status="Ditolak"
                      data-nohp="${escapeHtml(item.nohp)}"
                      data-nama="${escapeHtml(item.nama)}"
                      class="admin-action bg-red-500 hover:bg-red-600 text-white p-1.5 rounded shadow"
                      title="Tolak"
                    >
                      <svg class="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                  </div>
                `
                : '<span class="text-xs text-slate-400 font-medium">Selesai</span>';

            const deleteAction = canDelete
              ? `
                  <button
                    type="button"
                    data-action="delete"
                    data-row="${rowId}"
                    data-nama="${escapeHtml(item.nama)}"
                    data-timestamp="${escapeHtml(item.timestamp)}"
                    class="admin-action bg-slate-700 hover:bg-slate-800 text-white px-3 py-1.5 rounded shadow text-xs font-semibold"
                    title="Hapus data kemarin"
                  >
                    Hapus
                  </button>
                `
              : '<span class="text-[11px] text-slate-400">Hanya data kemarin</span>';

            const actionCell = `
              <div class="flex flex-wrap gap-2 justify-center items-center">
                ${statusActions}
                ${deleteAction}
              </div>
            `;

            row.innerHTML = `
              <td data-label="Waktu" class="px-6 py-4">${formatTimestamp(item.timestamp)}</td>
              <td data-label="Nama Mahasiswa" class="px-6 py-4">
                <div class="font-semibold text-slate-800">${escapeHtml(item.nama)}</div>
                <div class="text-xs text-slate-500">${escapeHtml(item.kelas)} | ${escapeHtml(item.nohp)}</div>
              </td>
              <td data-label="Detail Izin" class="px-6 py-4">
                <span class="font-medium">${escapeHtml(item.jenisIzin)}</span><br>
                <span class="text-xs text-slate-500">${escapeHtml(item.jamMakul)}</span>
              </td>
              <td data-label="Alasan" class="px-6 py-4 whitespace-normal min-w-[200px]">${escapeHtml(item.alasan)}</td>
              <td data-label="Bukti" class="px-6 py-4 text-center">${buktiLink}</td>
              <td data-label="Status" class="px-6 py-4 text-center" id="status-${rowId}">${getStatusBadge(normalizedStatus)}</td>
              <td data-label="Aksi" class="px-6 py-4 text-center">${actionCell}</td>
            `;
              tableBody.appendChild(row);
            });

          document.getElementById("countPending").textContent = pending;
          document.getElementById("countApproved").textContent = approved;
          document.getElementById("countRejected").textContent = rejected;
          document.getElementById("countTotal").textContent = String(
            data.filter((item) => item && (item.nama || item.kelas || item.status))
              .length,
          );

          tableDiv.classList.remove("hidden");
          applyFilter();
        } catch (error) {
          alert(`Gagal memuat data dari server: ${error.message}`);
          console.error(error);
        } finally {
          loading.classList.add("hidden");
        }
      }

      async function updateStatus(rowId, newStatus, nohp, nama) {
        const confirmMsg = newStatus === "Disetujui" ? "Setujui" : "Tolak";
        if (
          !confirm(
            `Apakah Anda yakin ingin MEN-${confirmMsg.toUpperCase()} izin dari ${nama}?`,
          )
        ) {
          return;
        }

        const actionDiv = document.getElementById(`action-${rowId}`);
        if (actionDiv) {
          actionDiv.innerHTML =
            '<span class="text-xs text-blue-500 font-semibold animate-pulse">Memproses...</span>';
        }

        const normalizedNoHp = normalizeWhatsAppNumber(nohp);

        const payload = {
          apiKey: API_KEY,
          action: "update_status",
          row: rowId,
          status: newStatus,
          nohp: normalizedNoHp,
          nama,
        };

        try {
          const result = await postToScript(payload);

          if (result.status === "success") {
            loadData();
          } else {
            alert(
              `Gagal memperbarui status: ${result.message || "respons server tidak dikenal."}`,
            );
            loadData();
          }
        } catch (error) {
          alert(`Terjadi kesalahan saat memperbarui status: ${error.message}`);
          loadData();
        }
      }

      async function deleteRow(rowId, nama, timestamp) {
        if (!isYesterday(timestamp)) {
          alert("Hanya data izin dari hari kemarin yang boleh dihapus.");
          return;
        }

        if (
          !confirm(
            `Apakah Anda yakin ingin menghapus data izin kemarin milik ${nama}?`,
          )
        ) {
          return;
        }

        const payload = {
          apiKey: API_KEY,
          action: "delete_row",
          row: rowId,
        };

        try {
          const result = await postToScript(payload);

          if (result.status === "success") {
            loadData();
          } else {
            alert(
              `Gagal menghapus data: ${result.message || "respons server tidak dikenal."}`,
            );
            loadData();
          }
        } catch (error) {
          alert(`Terjadi kesalahan saat menghapus data: ${error.message}`);
          loadData();
        }
      }

      async function downloadExcel() {
        const selectedStatus = filterStatus.value;
        const exportUrl = new URL(SCRIPT_URL);

        exportUrl.searchParams.set("action", "export_excel");
        exportUrl.searchParams.set("apiKey", API_KEY);

        if (selectedStatus && selectedStatus !== "all") {
          exportUrl.searchParams.set("status", selectedStatus);
        }

        try {
          let response;

          try {
            response = await fetch(exportUrl.toString());
          } catch (error) {
            throw new Error(getConnectionErrorMessage());
          }

          const result = await parseJsonResponse(response);

          if (result.status !== "success" || !result.downloadUrl) {
            throw new Error(result.message || "Link download tidak tersedia.");
          }

          window.open(result.downloadUrl, "_blank", "noopener");
        } catch (error) {
          alert(`Gagal menyiapkan file Excel: ${error.message}`);
        }
      }

      tableBody.addEventListener("click", function (event) {
        const button = event.target.closest(".admin-action");

        if (!button) {
          return;
        }

        if (button.dataset.action === "delete") {
          deleteRow(
            Number(button.dataset.row),
            button.dataset.nama,
            button.dataset.timestamp,
          );
          return;
        }

        updateStatus(
          Number(button.dataset.row),
          button.dataset.status,
          button.dataset.nohp,
          button.dataset.nama,
        );
      });

      setInterval(loadData, AUTO_REFRESH_INTERVAL);
      filterStatus.addEventListener("change", applyFilter);
    </script>
  </body>
</html>
